<script>

const galleries = document.querySelectorAll(".horizontal-gallery");

let isDown = false;
let startX = 0;

let states = [];

galleries.forEach((gallery,index)=>{
    states[index] = {
        current:0,
        target:0
    };
});

/* ===== ドラッグ ===== */

document.addEventListener("mousedown", (e)=>{
    isDown = true;
    startX = e.clientX;
    document.body.classList.add("dragging");
});

document.addEventListener("mouseup", ()=>{
    isDown = false;
    document.body.classList.remove("dragging");
});

document.addEventListener("mousemove", (e)=>{
    if(!isDown) return;

    const dx = e.clientX - startX;
    startX = e.clientX;

    galleries.forEach((gallery,index)=>{
        states[index].target += dx;
    });
});

/* ===== アニメーション ===== */

function animate(){

    galleries.forEach((gallery,index)=>{

        const state = states[index];

        state.current += (state.target - state.current) * 0.1;

        const maxLeft = 0;
        const maxRight = -(gallery.scrollWidth - window.innerWidth);

        if(state.current > maxLeft) state.current = maxLeft;
        if(state.current < maxRight) state.current = maxRight;

        gallery.style.transform =
            `translateX(${state.current}px)`;
    });

    requestAnimationFrame(animate);
}

animate();

/* ===== クリック中央 ===== */

galleries.forEach((gallery,index)=>{

    gallery.querySelectorAll("img").forEach(img=>{

        img.addEventListener("click", ()=>{

            const rect = img.getBoundingClientRect();
            const imgCenter = rect.left + rect.width / 2;
            const screenCenter = window.innerWidth / 2;

            states[index].target += screenCenter - imgCenter;
        });

    });
});

window.addEventListener("resize", () => {

    galleries.forEach((gallery, index) => {

        const state = states[index];

        const maxLeft = 0;
        const maxRight = -(gallery.scrollWidth - window.innerWidth);

        if(state.target > maxLeft) state.target = maxLeft;
        if(state.target < maxRight) state.target = maxRight;

        if(state.current > maxLeft) state.current = maxLeft;
        if(state.current < maxRight) state.current = maxRight;

    });

});

/* ===== メニュー ===== */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* ===== カーソル非表示 ===== */
document.body.style.cursor = "none";
document.documentElement.style.cursor = "none";

/* ===== カーソル本体 ===== */
const cursor = document.createElement("div");
cursor.innerHTML = "❄︎";
cursor.style.position = "fixed";
cursor.style.pointerEvents = "none";
cursor.style.fontSize = "50px";
cursor.style.color = "white";
cursor.style.zIndex = "100000";
cursor.style.transform = "translate(-50%, -50%)";
document.body.appendChild(cursor);

/* ===== 遅れて動く雪 ===== */
const snow = document.createElement("div");
snow.innerHTML = "❄︎";
snow.style.position = "fixed";
snow.style.pointerEvents = "none";
snow.style.fontSize = "40px";
snow.style.color = "white";
snow.style.zIndex = "99999";
snow.style.transform = "translate(-50%, -50%)";
document.body.appendChild(snow);

/* ===== クリック回転 ===== */
let enableClickSpin = true;

document.addEventListener("click", e => {

    if(!enableClickSpin) return;

    const snow = document.createElement("div");
    snow.innerHTML = "❄︎";
    snow.style.position = "fixed";
    snow.style.left = e.clientX + "px";
    snow.style.top = e.clientY + "px";
    snow.style.fontSize = "30px";
    snow.style.color = "white";
    snow.style.pointerEvents = "none";
    snow.style.zIndex = "99999";
    snow.style.transform = "translate(-50%, -50%)";
    document.body.appendChild(snow);

    let rotation = 0;

    const spin = setInterval(() => {
        rotation += 6;
        snow.style.transform =
            "translate(-50%, -50%) rotate(" + rotation + "deg)";
    }, 16);

    setTimeout(() => {
        clearInterval(spin);
        snow.remove();
    }, 800);
});

/* ===== 位置管理 ===== */
let mouseX = 0;
let mouseY = 0;
let snowX = 0;
let snowY = 0;

/* マウス取得 */
document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

/* ===== カーソルアニメーション（横スクロールと分離） ===== */
function animateCursor(){

    /* 即追従 */
    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    /* 遅れて追従（慣性） */
    snowX += (mouseX - snowX) * 0.08;
    snowY += (mouseY - snowY) * 0.08;

    snow.style.left = snowX + "px";
    snow.style.top = snowY + "px";

    requestAnimationFrame(animateCursor);
}

animateCursor();

</script>
