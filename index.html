<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heavenward Submarine</title>

<style>
@font-face {
    font-family: 'Bespoke';
    src: url('fonts/Bespoke-MjPdRlygxs.ttf') format('truetype');
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Bespoke', sans-serif;
    cursor: none;
    position: relative;
    overflow: hidden;
}

/* リンク装飾 */
a {
    text-decoration: none;
}

/* メインボタン */
.gallery-button {
    color: white;
    font-size: 28px;
    letter-spacing: 4px;
    border: 1px solid white;
    padding: 13px 50px;
    transition: 0.4s;
    border-radius: 40px;
    position: relative;
    z-index: 10;
    white-space: nowrap;
    display: inline-block;
}

.gallery-button:hover,
.gallery-button:active,
.gallery-button:focus {
    background: white;
    color: rgb(4,0,219);
}



/* 背景動画 */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    pointer-events: none;
}

/* ================= スマホ最適化 ================= */
@media screen and (max-width:768px){

    body{
        padding:0 20px;
        text-align:center;
        background: #290db7;
    }

    .gallery-button{
        font-size:14px;
        letter-spacing:2px;
        padding:12px 20px;
        width:80%;
        max-width:320px;
        box-sizing:border-box;
        white-space: nowrap;
    }

    /* スマホ用：タップ反応を安定させる */
     .gallery-button {
     -webkit-tap-highlight-color: white;
    }
    .gallery-button.active-touch {
     background: white;
     color: rgb(4,0,219);
    }

    #bg-video{
        display:none;
    }
}

/* ================= LOADING SNOW ================= */

#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:white;
    overflow:hidden;
    z-index:9999;
}

/* 雪 */

.snow{
    position:absolute;
    top:-10px;
    width:6px;
    height:6px;
    background:rgb(57, 40, 247);
    border-radius:50%;
    opacity:0.6;
    animation:fall linear infinite;
}

.snow:nth-child(1){
    left:10%;
    animation-duration:4s;
}

.snow:nth-child(2){
    left:30%;
    animation-duration:6s;
}

.snow:nth-child(3){
    left:50%;
    animation-duration:5s;
}

.snow:nth-child(4){
    left:70%;
    animation-duration:7s;
}

.snow:nth-child(5){
    left:90%;
    animation-duration:4.5s;
}

@keyframes fall{
    0%{
        transform:translateY(0);
    }
    100%{
        transform:translateY(110vh);
    }
}

</style>
</head>
<body>

<!-- 背景動画 -->
<video id="bg-video"
       autoplay
       muted
       loop
       playsinline>
    <source src="Kyorikan-HP.mp4" type="video/mp4">
</video>

<!-- コンテンツ -->
<a href="gallery/gallery.html" class="gallery-button">
    Heavenward Submarine
</a>

<!-- Loading Screen -->
<div id="loader">
  <div class="snow"></div>
  <div class="snow"></div>
  <div class="snow"></div>
  <div class="snow"></div>
  <div class="snow"></div>
</div>

<script>

/* ===== スマホボタン ===== */
const button = document.querySelector(".gallery-button");

button.addEventListener("touchstart", () => {
    button.classList.add("active-touch");
});

button.addEventListener("touchend", () => {
    button.classList.remove("active-touch");
});

/* ===== メニュー ===== */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* ===== カーソル非表示 ===== */
document.body.style.cursor = "none";
document.documentElement.style.cursor = "none";

/* ===== カーソル本体 ===== */
const cursor = document.createElement("div");
cursor.innerHTML = "❄︎";
cursor.style.position = "fixed";
cursor.style.pointerEvents = "none";
cursor.style.fontSize = "50px";
cursor.style.color = "white";
cursor.style.zIndex = "100000";
cursor.style.transform = "translate(-50%, -50%)";
document.body.appendChild(cursor);

/* ===== 遅れて動く雪 ===== */
const snow = document.createElement("div");
snow.innerHTML = "❄︎";
snow.style.position = "fixed";
snow.style.pointerEvents = "none";
snow.style.fontSize = "40px";
snow.style.color = "white";
snow.style.zIndex = "99999";
snow.style.transform = "translate(-50%, -50%)";
document.body.appendChild(snow);

/* ===== クリック回転 ===== */
let enableClickSpin = true;

document.addEventListener("click", e => {

    if(!enableClickSpin) return;

    const snow = document.createElement("div");
    snow.innerHTML = "❄︎";
    snow.style.position = "fixed";
    snow.style.left = e.clientX + "px";
    snow.style.top = e.clientY + "px";
    snow.style.fontSize = "30px";
    snow.style.color = "white";
    snow.style.pointerEvents = "none";
    snow.style.zIndex = "99999";
    snow.style.transform = "translate(-50%, -50%)";
    document.body.appendChild(snow);

    let rotation = 0;

    const spin = setInterval(() => {
        rotation += 6;
        snow.style.transform =
            "translate(-50%, -50%) rotate(" + rotation + "deg)";
    }, 16);

    setTimeout(() => {
        clearInterval(spin);
        snow.remove();
    }, 800);
});

/* ===== 位置管理 ===== */
let mouseX = 0;
let mouseY = 0;
let snowX = 0;
let snowY = 0;

/* マウス取得 */
document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

/* ===== カーソルアニメーション（横スクロールと分離） ===== */
function animateCursor(){

    /* 即追従 */
    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    /* 遅れて追従（慣性） */
    snowX += (mouseX - snowX) * 0.08;
    snowY += (mouseY - snowY) * 0.08;

    snow.style.left = snowX + "px";
    snow.style.top = snowY + "px";

    requestAnimationFrame(animateCursor);
}

animateCursor();

</script>

<script>
window.addEventListener("load", function(){
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(() => {
      loader.style.display = "none";
  }, 600);
});
</script>

</body>
