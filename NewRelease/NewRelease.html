<!DOCTYPE html>
<html lang="ja">
<head><link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Release</title>

<style>

/* ================= フォント ================= */

@font-face{
    font-family:'Bespoke';
    src:url('../fonts/Bespoke-MjPdRlygxs.ttf');
}

@font-face{
    font-family:'GeorgiaCustom';
    src:url('../fonts/Courier New.ttf');
}

/* ================= 全体 ================= */

body{
    margin:0;
    background:#290db7;
    font-family:'Bespoke';
    color:white;
}
html, body, * {
    cursor: none !important;
}

/* ================= ロゴ ================= */

.logo{
    position:fixed;
    top:30px;
    left:60px;
    padding:10px 25px;
    border:1px solid white;
    border-radius:40px;
    text-decoration:none;
    color:white;
    z-index:100;
    transition:0.3s ease; 
    z-index: 10000;
}
.logo:hover{
    color:#5400fd;           
    border-color:#5400fd;    
}
.logo:active{
    color:#5400fd;
    border-color:#5400fd;
}

/* ================= メニュー ================= */

.menu-btn{
    position:fixed;
    top:10px;
    right:50px;
    font-size:40px;
    cursor:pointer;
    z-index:10000;
    color:white;
    transition: 0.3s ease;
}

.menu-btn:hover {
    color: rgba(255,255,255,0.4);
    transform: scale(0.98);
}

.menu{
    position:fixed;
    top:0;
    right:0;
    width:150px;
    height:100vh;
    background:#290db7;
    padding:120px 60px;
    transform:translateX(100%);
    transition:transform .5s ease;
    z-index:9999;
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    font-size:20px;
    margin-bottom:40px;
    transition: 0.3s ease;
}
.menu a:hover {
    color: rgba(255,255,255,0.4);
    transform: scale(0.98);
}

.menu.open{
    transform:translateX(0);
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    opacity:0;
    pointer-events:none;
    transition:opacity .4s ease;
    z-index:9000;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

/* ================= 上部ビジュアル ================= */

.top-visual{
    width:80%;
    height:90px;          
    margin-top:2px;       /* ロゴと被らないため */
}

.top-visual img{
    width:80%;
    height:auto;
    object-fit:cover;      /* 重要：トリミングして全面表示 */
    display:block;
}

/* ================= タイトル ================= */

.page-title{
    margin:30px 0 10px 120px;
    font-size:50px;
    font-weight:500;
}

/* サブタイトル */

.sub-title{
    margin:0 0 40px 120px;
    font-size:17px;
    font-weight:300;
    opacity:0.8;
}

/* ================= 動画 ================= */

.video-wrapper{
    width:300px;
    margin:0px 120px 50px 120px;
}

.video-bg{
    width:80%;
    display:block;
}

/* ================= スマホ最適化 ================= */

@media screen and (max-width:768px){

    /* 余白 */
    body{
        padding-bottom:80px;
    }

    /* ロゴ */
    .logo{
        top:20px;
        left:20px;
        padding:8px 18px;
        font-size:14px;
        white-space: nowrap;
    }

    /* メニュー幅調整 */
    .menu{
        width:40%;
        padding:120px 40px;
    }    
    .menu-btn{
        top:17px;
        font-family:'GeorgiaCustom';
        right:20px;
        font-size:35px;
    }

    /* タイトル */
    .page-title{
        margin:0px 20px 10px 20px;
        font-size:32px;
    }

    .sub-title{
        margin:0 20px 30px 20px;
        font-size:14px;
    }

    /* 動画を画面いっぱいに */
    .video-wrapper{
        width:80%;
        margin:10px 0;
        padding:0 20px;
        box-sizing:border-box;
    }

    .video-bg{
        width:80%;
        height:auto;
        display:block;
    }
        .top-visual{
        height:100px;                 
        margin:10px 0px 0px -20px;
        width:calc(100% - 30px);
        overflow:hidden;
    }

    .top-visual img{
        width:100%;
        height:80%;
    }

}

</style>
</head>

<body>

<a href="../index.html" class="logo">Heavenward Submarine</a>

<div class="menu-btn" onclick="toggleMenu()">≡</div>

<div class="menu" id="menu">
    <a href="../index.html">Heavenward Submarine</a>
    <a href="../gallery/gallery.html">Gallery</a>
    <a href="../NewRelease/NewRelease.html">New Release</a>
    <a href="../About/About.html">About</a>
    <a href="../Contact/Contact.html">Contact</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="top-visual">
    <img src="../About/images/top-visual.webp" alt="">
</div>

<h1 class="page-title">New Release</h1>
<h2 class="sub-title">Coming Soon</h2>

<div class="video-wrapper">

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="../NewRelease/images/Kyorikan.mp4" type="video/mp4">
    </video>

</div>

<script>

/* ===== メニュー ===== */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
}

/* ===== カーソル非表示 ===== */
document.body.style.cursor = "none";
document.documentElement.style.cursor = "none";

/* ===== カーソル本体 ===== */
const cursor = document.createElement("div");
cursor.innerHTML = "❄︎";
cursor.style.position = "fixed";
cursor.style.pointerEvents = "none";
cursor.style.fontSize = "50px";
cursor.style.color = "white";
cursor.style.zIndex = "100000";
cursor.style.transform = "translate(-50%, -50%)";
document.body.appendChild(cursor);

/* ===== 遅れて動く雪 ===== */
const snow = document.createElement("div");
snow.innerHTML = "❄︎";
snow.style.position = "fixed";
snow.style.pointerEvents = "none";
snow.style.fontSize = "40px";
snow.style.color = "white";
snow.style.zIndex = "99999";
snow.style.transform = "translate(-50%, -50%)";
document.body.appendChild(snow);

/* ===== クリック回転 ===== */
let enableClickSpin = true;

document.addEventListener("click", e => {

    if(!enableClickSpin) return;

    const snow = document.createElement("div");
    snow.innerHTML = "❄︎";
    snow.style.position = "fixed";
    snow.style.left = e.clientX + "px";
    snow.style.top = e.clientY + "px";
    snow.style.fontSize = "30px";
    snow.style.color = "white";
    snow.style.pointerEvents = "none";
    snow.style.zIndex = "99999";
    snow.style.transform = "translate(-50%, -50%)";
    document.body.appendChild(snow);

    let rotation = 0;

    const spin = setInterval(() => {
        rotation += 6;
        snow.style.transform =
            "translate(-50%, -50%) rotate(" + rotation + "deg)";
    }, 16);

    setTimeout(() => {
        clearInterval(spin);
        snow.remove();
    }, 800);
});

/* ===== 位置管理 ===== */
let mouseX = 0;
let mouseY = 0;
let snowX = 0;
let snowY = 0;

/* マウス取得 */
document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

/* ===== カーソルアニメーション（横スクロールと分離） ===== */
function animateCursor(){

    /* 即追従 */
    cursor.style.left = mouseX + "px";
    cursor.style.top = mouseY + "px";

    /* 遅れて追従（慣性） */
    snowX += (mouseX - snowX) * 0.08;
    snowY += (mouseY - snowY) * 0.08;

    snow.style.left = snowX + "px";
    snow.style.top = snowY + "px";

    requestAnimationFrame(animateCursor);
}

animateCursor();

</script>

</body>
</html>
